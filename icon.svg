<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#08080f"/>
  <!-- Bone shape -->
  <g transform="translate(256,256) rotate(-45)">
    <!-- Main shaft -->
    <rect x="-20" y="-90" width="40" height="180" rx="8" fill="#ff7b2e"/>
    <!-- End caps -->
    <circle cx="0" cy="-90" r="36" fill="#ff7b2e"/>
    <circle cx="0" cy="90" r="36" fill="#ff7b2e"/>
    <!-- Knobs -->
    <circle cx="-28" cy="-90" r="16" fill="#ffa040"/>
    <circle cx="28" cy="-90" r="16" fill="#ffa040"/>
    <circle cx="-28" cy="90" r="16" fill="#ffa040"/>
    <circle cx="28" cy="90" r="16" fill="#ffa040"/>
  </g>
  <!-- Joint dots -->
  <circle cx="160" cy="180" r="14" fill="#f5c842"/>
  <circle cx="352" cy="332" r="14" fill="#f5c842"/>
</svg>
